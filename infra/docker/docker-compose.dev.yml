services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: grader
      POSTGRES_PASSWORD: grader
      POSTGRES_DB: grader
    ports:
      - "5432:5432"
    volumes:
      - grader_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grader -d grader"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: grader
      MINIO_ROOT_PASSWORD: gradergrader
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - grader_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  grader_pg:
  grader_minio:
